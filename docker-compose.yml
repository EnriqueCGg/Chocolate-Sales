services:
  db:
    image: postgres:15
    container_name: postgres_api_db
    restart: always
    environment:
      # Docker tomará estos valores de tu archivo .env local
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: